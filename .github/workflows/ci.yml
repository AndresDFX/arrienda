name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Instalar dependencias
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Test (dominio compartido)
        run: bun run --cwd packages/shared test

      - name: Typecheck dominio
        run: bun run --cwd packages/shared typecheck

      - name: Build web (genera routeTree y valida el bundle)
        run: bun run --cwd apps/web build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || 'http://localhost:54321' }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
