name: Deploy

# Despliega a Cloudflare Workers (free tier) y aplica migraciones a Supabase.
#
# Secrets/Variables requeridos en GitHub (Settings > Secrets and variables > Actions):
#   Secrets:
#     CLOUDFLARE_API_TOKEN        -> token con permiso "Edit Workers"
#     CLOUDFLARE_ACCOUNT_ID
#     SUPABASE_ACCESS_TOKEN       -> token personal de Supabase
#     SUPABASE_PROJECT_REF        -> ref del proyecto (ej. abcd1234)
#     SUPABASE_DB_PASSWORD        -> password de la base de datos
#     SUPABASE_SERVICE_ROLE_KEY   -> service role key (secreto del Worker)
#   Variables:
#     VITE_SUPABASE_URL           -> URL publica de Supabase
#     VITE_SUPABASE_ANON_KEY      -> anon key publica
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  migrate-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Aplicar migraciones
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push

  deploy-web:
    needs: migrate-db
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Instalar dependencias
        run: bun install --frozen-lockfile

      - name: Build + deploy a Cloudflare Workers
        working-directory: apps/web
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bun run deploy

      - name: Configurar secretos del Worker (servidor)
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.VITE_SUPABASE_URL }}" | bunx wrangler secret put SUPABASE_URL
          echo "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" | bunx wrangler secret put SUPABASE_SERVICE_ROLE_KEY
          # Cuando integres Wompi, anade aqui:
          #   echo "${{ secrets.WOMPI_PRIVATE_KEY }}" | bunx wrangler secret put WOMPI_PRIVATE_KEY
          #   echo "${{ secrets.WOMPI_EVENTS_SECRET }}" | bunx wrangler secret put WOMPI_EVENTS_SECRET
