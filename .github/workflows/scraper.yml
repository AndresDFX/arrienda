name: Scraper (extraccion de servicios)

# Motor de scraping de ARRIENDA+ ejecutado como job programado (Fase 1).
#
# Por que GitHub Actions: el cobro es mensual, no hace falta un servidor 24/7.
# Esta Action despierta a diario, reclama los jobs que la API tenga pendientes
# (encolados en sus fechas de corte), los procesa con Playwright y termina.
# Coste: dentro de los 2000 min/mes gratis (ilimitado si el repo es publico).
#
# Requisitos en GitHub (Settings > Secrets and variables > Actions):
#   Variables:
#     SCRAPER_API_BASE_URL  -> URL del Worker desplegado (ej. https://arrienda-web.<cuenta>.workers.dev)
#   Secrets:
#     SCRAPER_API_TOKEN     -> mismo secreto que valida el Worker en /api/scraper/*
#     SCRAPER_PROXY_URL     -> (opcional, Fase 3) proxy residencial
#
# Mientras los endpoints /api/scraper/claim y /result no esten desplegados (Fase 1),
# las corridas terminan en limpio sin procesar nada (no fallan).

on:
  schedule:
    # Diario 11:00 UTC = 06:00 America/Bogota. Ajusta a las fechas de corte reales.
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      proxy_url:
        description: 'Proxy URL opcional para esta corrida'
        required: false
        default: ''

concurrency:
  group: scraper
  cancel-in-progress: false

jobs:
  extraer:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'

      - name: Instalar dependencias
        run: bun install --frozen-lockfile

      - name: Instalar navegador (Chromium + deps del SO)
        run: bunx playwright install --with-deps chromium

      - name: Drenar jobs pendientes (modo --once)
        working-directory: apps/scraper
        env:
          SCRAPER_API_BASE_URL: ${{ vars.SCRAPER_API_BASE_URL }}
          SCRAPER_API_TOKEN: ${{ secrets.SCRAPER_API_TOKEN }}
          SCRAPER_HEADLESS: 'true'
          SCRAPER_PROXY_URL: ${{ inputs.proxy_url || secrets.SCRAPER_PROXY_URL }}
        run: bun run once
