name: arrienda-plus

# Entorno local dockerizado de la WEB.
#
#   - La base de datos + Auth los maneja la CLI de Supabase (`supabase start`),
#     que levanta su propio stack. El contenedor web la alcanza via host.docker.internal.
#   - El SCRAPER NO va aqui: necesita Chromium headful + IP residencial (Akamai/
#     Turnstile), por eso corre en el HOST (`bun run --cwd apps/scraper serve`).
#   - mailpit captura los correos de prueba.
#
# Requisitos antes de `docker compose up`:
#   1) supabase start   (Supabase local en el host)
#   2) cp apps/web/.dev.vars.example apps/web/.dev.vars.docker  (ya versionado el .docker con host.docker.internal)
services:
  web:
    # Node base (Vite + @cloudflare/vite-plugin no funciona bajo Bun: el dev server
    # del plugin usa WebSocket 'upgrade' que Bun no implementa). Bun solo para instalar
    # (entiende workspace:*); Vite corre bajo Node.
    image: node:22-bookworm-slim
    container_name: arrienda-web
    working_dir: /app
    command: sh -c "npm i -g bun@1.3.14 && bun install && cd apps/web && npx vite dev --host 0.0.0.0 --port 3000"
    environment:
      # Evita descargar navegadores de Playwright al instalar (el scraper corre en host).
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      VITE_USE_POLLING: '1'
      # Cliente (navegador, corre en el host -> 127.0.0.1):
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://127.0.0.1:55321}
      VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
      VITE_SCRAPER_TRIGGER_URL: ${VITE_SCRAPER_TRIGGER_URL:-http://localhost:8787}
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      # node_modules en volumenes anonimos: el contenedor (Linux) NO pisa los del
      # host (Windows) en el bind-mount. Evita que `bun install` del contenedor
      # rompa la resolucion en el host.
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/scraper/node_modules
      - /app/packages/shared/node_modules
      # Sobrescribe los secretos de servidor con la version "docker" (host.docker.internal):
      - ./apps/web/.dev.vars.docker:/app/apps/web/.dev.vars:ro
    extra_hosts:
      - 'host.docker.internal:host-gateway'

  mailpit:
    image: axllent/mailpit:latest
    container_name: arrienda-mailpit
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # UI web -> http://localhost:8025
    restart: unless-stopped
