name: arrienda-plus

# Entorno local dockerizado.
#
# La base de datos + Auth los maneja la CLI de Supabase (`supabase start`),
# que levanta su propio stack de contenedores. Este compose anade:
#   - mailpit : captura los correos de prueba (liquidaciones).
#   - scraper : motor de extraccion Playwright (Fase 1). Lo unico que de verdad
#               NECESITA Docker; no puede correr en Cloudflare.
#   - web     : (perfil "full", opcional) la app TanStack Start. Para desarrollo
#               con HMR rapido se recomienda correrla en el host con `bun run dev`.
services:
  mailpit:
    image: axllent/mailpit:latest
    container_name: arrienda-mailpit
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # UI web -> http://localhost:8025
    restart: unless-stopped

  scraper:
    build:
      context: .
      dockerfile: apps/scraper/Dockerfile
    container_name: arrienda-scraper
    env_file: .env
    environment:
      # Dentro del contenedor, el host se alcanza via host.docker.internal.
      SCRAPER_API_BASE_URL: ${SCRAPER_API_BASE_URL:-http://host.docker.internal:3000}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    restart: unless-stopped

  web:
    image: oven/bun:1.3.14
    container_name: arrienda-web
    profiles: ['full']
    working_dir: /app
    command: sh -c "bun install && bun run --cwd apps/web dev -- --host 0.0.0.0"
    env_file: .env
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
    extra_hosts:
      - 'host.docker.internal:host-gateway'
